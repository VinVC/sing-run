# sing-run Docker Compose 示例
#
# ═══════════════════════════════════════════════════════════════════════
# 默认模式 — 本地代理（从国内出国）
# ═══════════════════════════════════════════════════════════════════════
#
# 使用方法:
#   1. 复制 sources.sh.example 为 sources.sh 并配置订阅源
#   2. 构建镜像:  docker compose build
#   3. 更新节点:  docker compose run --rm sing-run update-nodes
#   4. 启动区域:  docker compose up -d
#   5. 查看日志:  docker compose logs -f sing-run
#   6. 停止:      docker compose down
#
# 管理命令:
#   docker compose run --rm sing-run sources        # 查看可用源
#   docker compose run --rm sing-run regions        # 查看可用区域
#   docker compose run --rm sing-run update-nodes   # 更新所有节点
#   docker compose run --rm sing-run update-ruleset # 更新路由规则集

services:
  sing-run:
    build:
      context: .
      args:
        SING_BOX_VERSION: "1.11.0"
    command: ["jp"]
    environment:
      # 环境变量优先于 command 参数，修改后 docker compose up -d 即可生效
      - SING_RUN_REGION=${SING_RUN_REGION:-}     # 区域（覆盖 command 中的区域）
      - SING_RUN_NODE=${SING_RUN_NODE:-}         # 节点：数字 / next / prev
      - SING_RUN_SOURCE=${SING_RUN_SOURCE:-}     # 订阅源短名
    volumes:
      - ./sources.sh:/app/sources.sh:ro
      - sing-run-data:/data
    ports:
      # 默认模式端口跟区域绑定，改区域时需同步修改端口映射
      # 各区域端口见 README「可用区域」表
      - "7810:7810"   # SOCKS (jp)
      - "7811:7811"   # HTTP  (jp)
    restart: unless-stopped

# ═══════════════════════════════════════════════════════════════════════
# Reverse 模式 — 海外网关（从海外回国）
# ═══════════════════════════════════════════════════════════════════════
